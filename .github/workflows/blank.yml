name: Build Dropbear Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['2016.74', '2017.75', '2018.76', '2019.78', '2020.81', '2022.83', '2024.86', '2025.87', '2026.88']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zlib1g-dev wget

      - name: Compile Dropbear
        run: |
          wget https://matt.ucc.asn.au/dropbear/releases/dropbear-${{ matrix.version }}.tar.bz2
          tar -xjf dropbear-${{ matrix.version }}.tar.bz2
          cd dropbear-${{ matrix.version }}
          ./configure LDFLAGS=-static
          make
          mv dropbear ../dropbear-${{ matrix.version }}-amd64

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dropbear-${{ matrix.version }}-amd64
          path: dropbear-${{ matrix.version }}-amd64

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          body: "Auto-compiled Dropbear binaries from 2016 to 2026."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
